# Full feature-coverage test: Seeed XIAO ESP32-C6 over USB.
# Exercises every phase-2 api_ble path: ListEntities/SubscribeStates for
# template binary_sensor/sensor/text_sensor/switch/light, the api_ble
# sensor/text_sensor HA-import platforms, and a homeassistant.action call.
# Native API over BLE only -- NO wifi and NO api component.
esphome:
  name: hable-feature-test

esp32:
  board: seeed_xiao_esp32c6
  framework:
    type: esp-idf

logger:

esp32_ble:

esp32_ble_server:

api_ble:
  # Noise encryption gate (USE_API_BLE_NOISE compile path on ESP32-C6).
  # Test-only key; not a secret.
  encryption:
    key: "aGFibGUtbm9pc2UtY29tcGlsZS10ZXN0LWtleS0zMiE="
  on_client_connected:
    - logger.log:
        format: "api_ble client connected: %s"
        args: ["client_info.c_str()"]
  on_client_disconnected:
    - logger.log: "api_ble client disconnected"

external_components:
  - source:
      type: local
      path: ../../components

binary_sensor:
  - platform: template
    name: "Feature Binary Sensor"
    id: feature_binary_sensor
    device_class: motion
    lambda: |-
      return (millis() / 1000) % 2 == 0;

sensor:
  - platform: template
    name: "Feature Sensor"
    id: feature_sensor
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    lambda: |-
      return (millis() % 100000) / 1000.0;
    update_interval: 10s

  # HA state import (device consumes a HA entity's numeric state).
  - platform: api_ble
    name: "Office Thermostat Local Temperature"
    entity_id: sensor.office_thermostat_local_temperature

text_sensor:
  - platform: template
    name: "Feature Text Sensor"
    id: feature_text_sensor
    lambda: |-
      return std::string("hable");
    update_interval: 60s

  # HA state import (device consumes a HA entity's string state).
  - platform: api_ble
    name: "Home Weather"
    entity_id: weather.forecast_home

switch:
  - platform: template
    name: "Feature Switch"
    id: feature_switch
    optimistic: true
    turn_on_action:
      # Device-originated Home Assistant action (forwarded to the connected,
      # service-subscribed client).
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: light.office_lamp_corner
      # capture_response path: request the JSON response body, with a response
      # template, and handle both success (with the parsed object) and error.
      - homeassistant.action:
          action: weather.get_forecasts
          data:
            entity_id: weather.forecast_home
            type: daily
          capture_response: true
          response_template: "{{ response['weather.forecast_home'].forecast[0].temperature }}"
          on_success:
            - logger.log:
                format: "forecast response: %s"
                args: ["response.size() ? \"got object\" : \"empty\""]
          on_error:
            - logger.log:
                format: "forecast failed: %s"
                args: ["error.c_str()"]
    turn_off_action:
      # Status-only path: on_success / on_error without capture_response.
      - homeassistant.action:
          action: light.turn_off
          data:
            entity_id: light.office_lamp_corner
          on_success:
            - logger.log: "turn_off succeeded"
          on_error:
            - logger.log:
                format: "turn_off failed: %s"
                args: ["error.c_str()"]

output:
  - platform: gpio
    id: feature_light_output
    pin: GPIO15

light:
  - platform: binary
    name: "Feature Light"
    id: feature_light
    output: feature_light_output

# Phase 4 entity-type coverage: exercises the ListEntities / SubscribeStates /
# command paths for cover, fan, climate, number, select, button, lock.
cover:
  - platform: template
    name: "Feature Cover"
    id: feature_cover
    device_class: shutter
    has_position: true
    optimistic: true
    open_action:
      - logger.log: "cover open"
    close_action:
      - logger.log: "cover close"
    stop_action:
      - logger.log: "cover stop"

fan:
  - platform: template
    name: "Feature Fan"
    id: feature_fan
    speed_count: 5
    preset_modes:
      - Auto
      - Sleep

climate:
  - platform: bang_bang
    name: "Feature Climate"
    id: feature_climate
    sensor: feature_sensor
    default_target_temperature_low: 18 °C
    default_target_temperature_high: 24 °C
    idle_action:
      - logger.log: "climate idle"
    heat_action:
      - logger.log: "climate heat"
    cool_action:
      - logger.log: "climate cool"

number:
  - platform: template
    name: "Feature Number"
    id: feature_number
    optimistic: true
    min_value: 0
    max_value: 100
    step: 1
    unit_of_measurement: "%"

select:
  - platform: template
    name: "Feature Select"
    id: feature_select
    optimistic: true
    options:
      - One
      - Two
      - Three

button:
  - platform: template
    name: "Feature Button"
    id: feature_button
    on_press:
      - logger.log: "button pressed"

lock:
  - platform: template
    name: "Feature Lock"
    id: feature_lock
    optimistic: true
    lambda: |-
      return LOCK_STATE_LOCKED;
