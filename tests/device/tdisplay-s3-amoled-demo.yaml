# LilyGO T-Display-S3 AMOLED demo: native API over BLE with the same
# button-driven display menu + entity set as the M5 Fire demo. Two buttons
# instead of three: BOOT (GPIO0) = up, KEY (GPIO21) short = down, KEY long
# (>=0.5s) = select. Battery-powered target: battery voltage is on GPIO4
# through an on-board /2 divider (PIN_BAT_VOLT in LilyGO's factory example),
# so real voltage + estimated % show on screen and export over the BLE API.
# Deliberately NO wifi and NO api component.
#
# No serial_console here: it piggybacks the logger UART, and this board's only
# USB is the S3's native USB_SERIAL_JTAG (no external UART bridge), where the
# console component is inactive. Logs work over the same native USB.
esphome:
  name: hable-tdisplay-amoled
  friendly_name: Hable T-Display AMOLED

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal

logger:

esp32_ble:

esp32_ble_server:

api_ble:
  # Deliberately non-default values so the conn-params-verify log line can
  # unambiguously show whether the central honored our request (ROADMAP #5).
  connection:
    min_interval: 90ms
    max_interval: 120ms
    latency: 2
    timeout: 5s

external_components:
  - source:
      type: local
      path: ../../components

script:
  - id: spotify_playpause
    then:
      - homeassistant.action:
          action: media_player.media_play_pause
          data:
            entity_id: media_player.spotify_landorghini

# RM67162 AMOLED over QSPI; CS/reset/enable pins are baked into the
# mipi_spi T-DISPLAY-S3-AMOLED model (6/17/38).
spi:
  id: quad_spi
  type: quad
  clk_pin: GPIO47
  data_pins: [GPIO18, GPIO7, GPIO48, GPIO5]

font:
  - file: gfonts://Roboto@500
    id: font_menu
    size: 20

# HA states imported over the BLE API.
sensor:
  - platform: api_ble
    id: office_temp
    entity_id: sensor.office_thermostat_local_temperature
    on_value:
      - lambda: static_cast<esphome::display_menu_base::DisplayMenuComponent *>(id(main_menu))->draw();
  # Battery voltage: GPIO4 reads VBAT/2 via the on-board divider.
  - platform: adc
    pin: GPIO4
    id: batt_volt
    name: "Battery Voltage"
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 2
    attenuation: 12db
    update_interval: 10s
    filters:
      - multiply: 2.0
    on_value:
      - lambda: static_cast<esphome::display_menu_base::DisplayMenuComponent *>(id(main_menu))->draw();
  # Rough LiPo state-of-charge from voltage (linear 3.30-4.15 V). Coarse but
  # fine for battery-drain testing; reads high while USB is charging.
  - platform: template
    id: batt_pct
    name: "Battery Level"
    unit_of_measurement: "%"
    device_class: battery
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      float v = id(batt_volt).state;
      if (isnan(v))
        return NAN;
      float pct = (v - 3.30f) / (4.15f - 3.30f) * 100.0f;
      return clamp(pct, 0.0f, 100.0f);

text_sensor:
  - platform: api_ble
    id: weather_state
    entity_id: weather.forecast_home
    on_value:
      - lambda: static_cast<esphome::display_menu_base::DisplayMenuComponent *>(id(main_menu))->draw();
  - platform: api_ble
    id: spotify_state
    entity_id: media_player.spotify_landorghini
    on_value:
      - lambda: static_cast<esphome::display_menu_base::DisplayMenuComponent *>(id(main_menu))->draw();
  - platform: api_ble
    id: spotify_title
    entity_id: media_player.spotify_landorghini
    attribute: media_title
    on_value:
      - lambda: static_cast<esphome::display_menu_base::DisplayMenuComponent *>(id(main_menu))->draw();

# Spotify volume 0-100, pushed to HA on change.
number:
  - platform: template
    id: spotify_volume
    name: "Spotify Volume"
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 25
    optimistic: true
    set_action:
      - homeassistant.action:
          action: media_player.volume_set
          data:
            entity_id: media_player.spotify_landorghini
            volume_level: !lambda |-
              char buf[8];
              snprintf(buf, sizeof(buf), "%.2f", x / 100.0f);
              return std::string(buf);

# Local switch mirroring the office lamp; drives it via homeassistant.action.
switch:
  - platform: template
    id: office_lamp
    name: "Office Lamp"
    optimistic: true
    turn_on_action:
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: light.office_lamp_corner
    turn_off_action:
      - homeassistant.action:
          action: light.turn_off
          data:
            entity_id: light.office_lamp_corner

binary_sensor:
  # BOOT button = select; strap pin with on-board pull-up, pressed = low.
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    id: btn_select
    name: "Button Select"
    on_press:
      - display_menu.enter: main_menu
  # KEY button = next: short press = down, hold >=0.5s = back (up).
  - platform: gpio
    pin:
      number: GPIO21
      inverted: true
      mode:
        input: true
        pullup: true
    id: btn_next
    name: "Button Next"
    on_multi_click:
      - timing:
          - ON for at most 0.4s
        then:
          - display_menu.down: main_menu
      - timing:
          - ON for at least 0.5s
        then:
          - display_menu.up: main_menu

graphical_display_menu:
  id: main_menu
  display: amoled_display
  font: font_menu
  active: true
  items:
    - type: switch
      text: "Office Lamp"
      switch: office_lamp
      on_text: "ON"
      off_text: "OFF"
    - type: label
      text: !lambda |-
        float v = id(batt_volt).state;
        float p = id(batt_pct).state;
        if (isnan(v))
          return std::string("Battery: --");
        char buf[32];
        if (isnan(p))
          snprintf(buf, sizeof(buf), "Battery: %.2fV", v);
        else
          snprintf(buf, sizeof(buf), "Battery: %.2fV %.0f%%", v, p);
        return std::string(buf);
    - type: label
      text: !lambda |-
        if (isnan(id(office_temp).state))
          return std::string("Office: --.- C");
        char buf[32];
        snprintf(buf, sizeof(buf), "Office: %.1f C", id(office_temp).state);
        return std::string(buf);
    - type: label
      text: !lambda |-
        std::string w = id(weather_state).state;
        if (w.empty())
          w = "--";
        return "Weather: " + w;
    - type: label
      text: !lambda |-
        std::string s = id(spotify_state).state;
        if (s.empty())
          s = "--";
        return "Spotify: " + s;
    - type: label
      text: !lambda |-
        std::string t = id(spotify_title).state;
        if (t.empty())
          t = "--";
        if (t.size() > 34)
          t = t.substr(0, 33) + "~";
        return "> " + t;
    - type: command
      text: "Spotify Play/Pause"
      on_value:
        - homeassistant.action:
            action: media_player.media_play_pause
            data:
              entity_id: media_player.spotify_landorghini
    - type: number
      text: "Spotify Vol"
      number: spotify_volume
      format: "%.0f"

display:
  # Native panel is 240x536 portrait; rotate to landscape for the menu.
  - platform: mipi_spi
    model: T-DISPLAY-S3-AMOLED
    id: amoled_display
    spi_id: quad_spi
    rotation: 90
    update_interval: 1s
    # mipi_spi allocates a draw buffer only for lambda/pages/test-card and
    # otherwise force-enables the RGB test card — it can't see that
    # graphical_display_menu draws externally. The no-op lambda buys the
    # buffer and suppresses the test card; the menu's page replaces it at
    # setup (ili9xxx on the Fire always buffers, so it never needed this).
    lambda: |-
      return;
